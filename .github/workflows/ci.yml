name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pydantic python-dotenv pytest httpx requests

      - name: Create dummy .env
        run: |
          echo "MODEL_PATH=models/bert-sentiment" > .env
          echo "MAX_TEXT_LENGTH=256" >> .env

      - name: Create dummy model folder
        run: mkdir -p models/bert-sentiment

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for build
        run: |
          echo "MODEL_PATH=models/bert-sentiment" > .env
          echo "MAX_TEXT_LENGTH=256" >> .env

      - name: Build Docker image
        run: docker build -t sentiment-bert-api:ci-test .

      - name: Confirm success
        run: echo "Docker build successful"