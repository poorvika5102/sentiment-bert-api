name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Run tests ──────────────────────────────────
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Check test coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=api --cov-report=term-missing

  # ── Job 2: Build Docker image ─────────────────────────
 docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Docker build
        run: |
          cat > .env << 'EOF'
          MODEL_PATH=models/bert-sentiment
          API_HOST=0.0.0.0
          API_PORT=8000
          MAX_TEXT_LENGTH=256
          EOF

      - name: Create dummy src folder content
        run: |
          mkdir -p models/bert-sentiment
          mkdir -p data/raw data/processed

      - name: Build Docker image
        run: docker build -t sentiment-bert-api:ci-test .

      - name: Confirm success
        run: |
          docker images sentiment-bert-api:ci-test
          echo "✅ Docker build successful"

  # ── Job 3: Code quality ───────────────────────────────
  lint:
    name: Code quality check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 api/ src/ app/ --max-line-length=100 --ignore=E501,W503 || true